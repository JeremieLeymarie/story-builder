name: CI

on: [push]

jobs:
  client:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Use Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.6

      - run: bun install

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Typescript
        run: bun run typescript

      - name: Test
        run: bun run test:single

  server:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "server/.python-version"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run type check
        run: uv run mypy .

      - name: Run linter
        run: uv run ruff check

  publish-api:
    runs-on: ubuntu-latest

    needs:
      - client
      - server

    defaults:
      run:
        working-directory: ./server

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}-api

    # DOC => https://docs.github.com/en/packages/managing-github-packages-using-github-actions-workflows/publishing-and-installing-a-package-with-github-actions#upgrading-a-workflow-that-accesses-ghcrio
    steps:
      - uses: actions/checkout@v4
      - name: Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish Backend
        run: |
          docker build . --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

